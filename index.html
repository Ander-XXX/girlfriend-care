<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🌸 君君宝宝，头痛退散！</title>
<meta property="og:title" content="🌸 君君宝宝，专属治愈小魔法">
<meta property="og:description" content="点一下，有惊喜哦～">
<meta name="twitter:card" content="summary">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    min-height: 100vh;
    overflow-x: hidden;
    color: #e8d5c4;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    position: relative;
  }

  /* ===== 星空背景 ===== */
  .stars-container {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 0;
  }
  .star {
    position: absolute;
    border-radius: 50%;
    animation: twinkle var(--dur) ease-in-out infinite;
    animation-delay: var(--delay);
    opacity: 0;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.2; transform: scale(1); }
    50% { opacity: 0.9; transform: scale(1.5); }
  }

  /* ===== 飘落的花瓣和爱心 ===== */
  .falling-petal {
    position: fixed; pointer-events: none; z-index: 0;
    animation: petalFall var(--fall-dur) linear infinite;
    animation-delay: var(--fall-delay);
    font-size: var(--petal-size);
    left: var(--petal-x);
    top: -30px;
    opacity: 0.7;
  }
  @keyframes petalFall {
    0% { transform: translateY(0) rotate(0deg) translateX(0); opacity: 0; }
    5% { opacity: 0.7; }
    90% { opacity: 0.5; }
    100% { transform: translateY(105vh) rotate(var(--petal-rot)) translateX(var(--petal-drift)); opacity: 0; }
  }

  /* ===== 主容器 ===== */
  .main {
    position: relative; z-index: 1;
    max-width: 420px; margin: 0 auto;
    padding: 40px 24px 60px;
    display: flex; flex-direction: column; align-items: center;
    gap: 28px;
  }

  /* ===== 顶部头像区域 ===== */
  .hero {
    text-align: center;
    animation: fadeInDown 0.8s ease-out;
  }
  .hero-emoji {
    font-size: 80px;
    animation: gentleBounce 2s ease-in-out infinite;
    filter: drop-shadow(0 0 20px rgba(255, 183, 197, 0.3));
    display: block;
  }
  @keyframes gentleBounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }
  @keyframes fadeInDown {
    from { opacity: 0; transform: translateY(-30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .hero h1 {
    font-size: 28px; font-weight: 700;
    background: linear-gradient(135deg, #f8c8d8, #e8b4c8, #fad0c4);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-top: 12px;
  }
  .hero .sub {
    font-size: 14px; color: #a09080; margin-top: 6px;
    letter-spacing: 2px;
  }

  /* ===== 爱心分隔线 ===== */
  .heart-divider {
    display: flex; align-items: center; gap: 10px;
    animation: fadeInDown 0.8s ease-out 0.15s both;
  }
  .heart-divider span {
    font-size: 12px; animation: heartbeat 1.2s ease-in-out infinite;
  }
  .heart-divider span:nth-child(2) { animation-delay: 0.2s; }
  .heart-divider span:nth-child(3) { animation-delay: 0.4s; }
  .heart-divider span:nth-child(4) { animation-delay: 0.6s; }
  .heart-divider span:nth-child(5) { animation-delay: 0.8s; }

  /* ===== 关爱卡片区 ===== */
  .section-title {
    font-size: 15px; color: #a09080; letter-spacing: 1px;
    text-align: center; animation: fadeInDown 0.8s ease-out 0.2s both;
  }

  .care-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    width: 100%;
    animation: fadeInDown 0.8s ease-out 0.3s both;
  }
  .care-card {
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 20px;
    padding: 24px 16px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    overflow: hidden;
    backdrop-filter: blur(10px);
  }
  .care-card:active {
    transform: scale(0.95);
    background: rgba(255, 255, 255, 0.08);
  }
  .care-card .icon {
    font-size: 40px; display: block; margin-bottom: 8px;
    transition: transform 0.3s;
  }
  .care-card:active .icon { transform: scale(1.2); }
  .care-card .label {
    font-size: 14px; color: #c0a890; font-weight: 500;
  }
  .care-card .ripple {
    position: absolute; border-radius: 50%;
    background: rgba(255, 200, 200, 0.3);
    transform: scale(0); animation: ripple 0.6s ease-out;
    pointer-events: none;
  }
  @keyframes ripple {
    to { transform: scale(4); opacity: 0; }
  }

  /* ===== 消息弹窗 ===== */
  .toast {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0);
    background: rgba(40, 30, 40, 0.95);
    border: 1px solid rgba(255, 200, 200, 0.3);
    border-radius: 24px;
    padding: 32px 28px;
    text-align: center;
    z-index: 100;
    backdrop-filter: blur(20px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 80px rgba(255,180,200,0.15);
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    max-width: 300px;
  }
  .toast.show { transform: translate(-50%, -50%) scale(1); }
  .toast .big-emoji { font-size: 60px; display: block; margin-bottom: 12px; }
  .toast .msg { font-size: 18px; line-height: 1.6; color: #e8d5c4; }
  .toast .sub-msg { font-size: 13px; color: #a09080; margin-top: 6px; }

  .overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); z-index: 99;
    opacity: 0; pointer-events: none; transition: opacity 0.3s;
  }
  .overlay.active { opacity: 1; pointer-events: auto; }

  /* ===== 音乐播放器弹窗 ===== */
  .music-toast {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0);
    background: rgba(40, 30, 40, 0.95);
    border: 1px solid rgba(255, 200, 200, 0.3);
    border-radius: 24px;
    padding: 24px 20px 20px;
    text-align: center;
    z-index: 100;
    backdrop-filter: blur(20px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 80px rgba(255,180,200,0.15);
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    width: 320px;
  }
  .music-toast.show { transform: translate(-50%, -50%) scale(1); }
  .music-toast .music-title {
    font-size: 16px; color: #f0c8d8; margin-bottom: 4px; font-weight: 600;
  }
  .music-toast .music-artist {
    font-size: 13px; color: #a09080; margin-bottom: 16px;
  }
  .music-toast iframe {
    border-radius: 12px; display: block; margin: 0 auto;
  }
  .music-toast .music-note {
    font-size: 12px; color: #706058; margin-top: 12px;
    line-height: 1.6;
  }

  /* ===== 飘落特效 ===== */
  .float-particle {
    position: fixed; pointer-events: none; z-index: 50;
    font-size: var(--size);
    animation: floatUp var(--dur) ease-out forwards;
    left: var(--x);
  }
  @keyframes floatUp {
    0% { opacity: 1; transform: translateY(0) rotate(0deg) scale(0); }
    20% { opacity: 1; transform: translateY(-20px) rotate(20deg) scale(1); }
    100% { opacity: 0; transform: translateY(-200px) rotate(var(--rot)) scale(0.3); }
  }

  /* ===== 底部暖心语 ===== */
  .footer-msg {
    text-align: center; animation: fadeInDown 0.8s ease-out 0.5s both;
  }
  .footer-msg p {
    font-size: 13px; color: #706058; line-height: 1.8;
  }
  .footer-msg .heartbeat {
    display: inline-block; animation: heartbeat 1.2s ease-in-out infinite;
    color: #e8879a; font-size: 16px;
  }
  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    25% { transform: scale(1.3); }
    50% { transform: scale(1); }
    75% { transform: scale(1.3); }
  }

  /* ===== 响应式 ===== */
  @media (max-width: 360px) {
    .hero-emoji { font-size: 60px; }
    .hero h1 { font-size: 24px; }
    .care-card { padding: 18px 12px; }
    .care-card .icon { font-size: 32px; }
  }
</style>
</head>
<body>

<!-- 星空 -->
<div class="stars-container" id="stars"></div>

<!-- 飘落花瓣 + 爱心 -->
<div id="fallingPetals"></div>

<!-- 主内容 -->
<div class="main">

  <!-- 顶部 -->
  <div class="hero">
    <span class="hero-emoji">🌸💖</span>
    <h1>君君宝宝，头痛快走开</h1>
    <p class="sub">✦ 点一点下面的小魔法 ✦</p>
  </div>

  <!-- 爱心分隔线 -->
  <div class="heart-divider">
    <span>💕</span><span>🌸</span><span>💗</span><span>🌷</span><span>💝</span>
  </div>

  <!-- 关爱按钮 -->
  <p class="section-title">👇 选一个我能为宝宝做的</p>
  <div class="care-grid" id="careGrid">
    <div class="care-card" data-action="hug">
      <span class="icon">🤗</span>
      <span class="label">远程抱抱</span>
    </div>
    <div class="care-card" data-action="tea">
      <span class="icon">🍵</span>
      <span class="label">泡杯热茶</span>
    </div>
    <div class="care-card" data-action="massage">
      <span class="icon">💆‍♀️</span>
      <span class="label">头部按摩</span>
    </div>
    <div class="care-card" data-action="story">
      <span class="icon">📖</span>
      <span class="label">讲个故事</span>
    </div>
    <div class="care-card" data-action="song">
      <span class="icon">🌸</span>
      <span class="label">送你一首鲜花</span>
    </div>
    <div class="care-card" data-action="blanket">
      <span class="icon">🛋️</span>
      <span class="label">盖好毯子</span>
    </div>
  </div>

  <!-- 底部 -->
  <div class="footer-msg">
    <p>不管多远，我的心都在宝宝身边 <span class="heartbeat">❤️</span></p>
    <p>好好休息，睡一觉就好了~</p>
    <p>君君是世界上最好的宝宝 🌸</p>
    <p style="margin-top:8px; font-size:12px; color:#504840;">—— 永远爱你的我 💕</p>
  </div>
</div>

<!-- 弹窗遮罩 -->
<div class="overlay" id="overlay"></div>
<!-- 弹窗 -->
<div class="toast" id="toast">
  <span class="big-emoji" id="toastEmoji"></span>
  <p class="msg" id="toastMsg"></p>
  <p class="sub-msg" id="toastSub"></p>
</div>

<!-- 音乐播放器弹窗 -->
<div class="music-toast" id="musicToast">
  <p class="music-title">🌸 鲜花</p>
  <p class="music-artist">回春丹</p>
  <iframe id="musicFrame" frameborder="no" border="0" marginwidth="0" marginheight="0"
    width="280" height="86"
    src=""
    style="display:none;">
  </iframe>
  <div id="musicLoading" style="padding:16px; color:#a09080; font-size:14px;">🎶 正在加载...</div>
  <p class="music-note">「我的心啊我的心，整栋出租<br/>处处都给你，种好的鲜花」</p>
</div>

<script>
// ===== 生成星空（爱心和星星混搭）=====
(function createStars() {
  const container = document.getElementById('stars');
  const stars = ['✦', '✧', '⭑', '·', '♥', '♡'];
  const count = 100;
  let html = '';
  for (let i = 0; i < count; i++) {
    const isStar = Math.random() > 0.3; // 70% 星星, 30% 爱心
    const char = isStar ? stars[Math.floor(Math.random() * 4)] : stars[4 + Math.floor(Math.random() * 2)];
    const size = Math.random() * 3 + 1.5;
    const x = Math.random() * 100;
    const y = Math.random() * 100;
    const dur = Math.random() * 3 + 2;
    const delay = Math.random() * 4;
    const color = isStar ? 'white' : (Math.random() > 0.5 ? '#ffb7c5' : '#f8c8d8');
    html += `<div class="star" style="
      width:${size}px; height:${size}px;
      left:${x}%; top:${y}%;
      --dur:${dur}s; --delay:${delay}s;
      background:${color};
    "></div>`;
  }
  container.innerHTML = html;
})();

// ===== 飘落花瓣和爱心 =====
(function createFallingPetals() {
  const container = document.getElementById('fallingPetals');
  const petals = ['🌸', '💕', '🌷', '💖', '🌺', '💗', '🌻', '💝', '🌹', '💐', '🩷', '🍀'];
  const count = 25;
  let html = '';
  for (let i = 0; i < count; i++) {
    const petal = petals[Math.floor(Math.random() * petals.length)];
    const size = Math.random() * 14 + 12;
    const x = Math.random() * 100;
    const dur = Math.random() * 10 + 12;
    const delay = Math.random() * 15;
    const rot = Math.random() * 720 - 360;
    const drift = (Math.random() - 0.5) * 120;
    html += `<span class="falling-petal" style="
      --petal-size:${size}px;
      --petal-x:${x}%;
      --fall-dur:${dur}s;
      --fall-delay:${delay}s;
      --petal-rot:${rot}deg;
      --petal-drift:${drift}px;
    ">${petal}</span>`;
  }
  container.innerHTML = html;
})();

// ===== 关爱卡片数据 =====
const messages = {
  hug: {
    emoji: '🤗💕',
    msg: '一个大大的熊抱给君君宝宝！',
    sub: '把所有温暖都传递给你～'
  },
  tea: {
    emoji: '🍵💛',
    msg: '一杯热乎乎的蜂蜜柠檬茶',
    sub: '宝宝小心烫，慢慢喝哦～'
  },
  massage: {
    emoji: '💆‍♀️🌸',
    msg: '轻轻帮宝宝揉揉太阳穴',
    sub: '闭上眼睛，放松～放松～'
  },
  story: {
    emoji: '📖🌙',
    msg: '从前有一只可爱的君君宝宝...',
    sub: '她正在看这段话，然后笑了 💤'
  },
  song: {
    emoji: '🌸🎸',
    msg: '回春丹 —《鲜花》',
    sub: '点一下听歌，送给君君宝宝 💐',
    isMusic: true
  },
  blanket: {
    emoji: '🛋️🌷',
    msg: '毯子盖好了，被子也掖好了',
    sub: '君君宝宝是全世界最温暖的宝宝～'
  }
};

// ===== 点击卡片 =====
const overlay = document.getElementById('overlay');
const toast = document.getElementById('toast');
const toastEmoji = document.getElementById('toastEmoji');
const toastMsg = document.getElementById('toastMsg');
const toastSub = document.getElementById('toastSub');

document.getElementById('careGrid').addEventListener('click', function(e) {
  const card = e.target.closest('.care-card');
  if (!card) return;

  const action = card.dataset.action;
  const data = messages[action];
  if (!data) return;

  // 波纹效果
  const ripple = document.createElement('span');
  ripple.className = 'ripple';
  const rect = card.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height);
  ripple.style.width = ripple.style.height = size + 'px';
  ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
  ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
  card.appendChild(ripple);
  ripple.addEventListener('animationend', () => ripple.remove());

  // 音乐卡片特殊处理
  if (data.isMusic) {
    showMusicPlayer(card);
    return;
  }

  // 显示普通弹窗
  toastEmoji.textContent = data.emoji;
  toastMsg.textContent = data.msg;
  toastSub.textContent = data.sub;
  overlay.classList.add('active');
  toast.classList.add('show');

  // 飘落特效
  spawnParticles(card);
});

// ===== 关闭弹窗 =====
function closeToast() {
  overlay.classList.remove('active');
  toast.classList.remove('show');
}
overlay.addEventListener('click', function() {
  closeToast();
  closeMusicPlayer();
});

// ===== 音乐播放器 =====
const musicToast = document.getElementById('musicToast');
const musicFrame = document.getElementById('musicFrame');
const musicLoading = document.getElementById('musicLoading');
const NETEASE_SONG_ID = '2088079571';
let musicLoaded = false;

function showMusicPlayer(source) {
  overlay.classList.add('active');
  musicToast.classList.add('show');

  if (!musicLoaded) {
    setTimeout(() => {
      musicFrame.src = 'https://music.163.com/outchain/player?type=2&id=' + NETEASE_SONG_ID + '&auto=0&height=66';
      musicFrame.style.display = 'block';
      musicLoading.style.display = 'none';
      musicLoaded = true;
    }, 400);
  }

  // 大量鲜花特效！
  spawnParticles(source, 25);
  setTimeout(() => spawnParticles(source, 15), 800);
  setTimeout(() => spawnParticles(source, 20), 1600);
}

function closeMusicPlayer() {
  musicToast.classList.remove('show');
}

musicToast.addEventListener('click', function(e) {
  spawnParticles(musicToast, 12);
  closeMusicPlayer();
  overlay.classList.remove('active');
});

// ===== 飘落粒子（爱心 + 花为主）=====
function spawnParticles(source, count = 15) {
  const rect = source.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const emojis = ['💕', '🌸', '💖', '🌷', '💗', '🌺', '💝', '🌹', '🩷', '💐'];

  for (let i = 0; i < count; i++) {
    const el = document.createElement('span');
    el.className = 'float-particle';
    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    el.style.setProperty('--x', (cx + (Math.random() - 0.5) * 160) + 'px');
    el.style.setProperty('--dur', (Math.random() * 1.5 + 1.5) + 's');
    el.style.setProperty('--size', (Math.random() * 20 + 16) + 'px');
    el.style.setProperty('--rot', (Math.random() * 120 - 60) + 'deg');
    el.style.top = cy + 'px';
    document.body.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }
}

// ===== 定时自动飘爱心和花 =====
setInterval(() => {
  const fakeSource = {
    getBoundingClientRect: () => ({
      left: Math.random() * window.innerWidth * 0.8 + window.innerWidth * 0.1,
      top: Math.random() * window.innerHeight * 0.6 + window.innerHeight * 0.2,
      width: 40, height: 40
    })
  };
  spawnParticles(fakeSource, 4);
}, 5000);
</script>

</body>
</html>
